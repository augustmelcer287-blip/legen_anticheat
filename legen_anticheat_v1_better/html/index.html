<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LegenAC</title><link rel="stylesheet" href="style.css"></head><body><div id="app" class="hidden"><div class="panel"><div class="top"><div><h1>Legen AntiCheat <span>V1</span></h1><p id="server">Admin Control Center</p></div><button onclick="closeMenu()">×</button></div><div class="stats"><div><b id="count">0</b><span>Players</span></div><div><b id="admins">0</b><span>Admins</span></div><div><b id="bypass">0</b><span>Bypass</span></div></div><div class="grid"><section><div class="sectionTitle"><h2>Online Players</h2><button onclick="refresh()">Refresh</button></div><div id="players" class="players"></div></section><aside><h2>Actions</h2><label>Player ID</label><input id="pid" placeholder="Example: 4"><label>Reason</label><input id="reason" placeholder="Reason"><div class="row"><button class="danger" onclick="ban()">Ban</button><button class="warn" onclick="kick()">Kick</button></div><label>Unban License</label><input id="license" placeholder="license:xxxxxxxx"><button class="good" onclick="unban()">Unban</button><div class="hint">ACE required: <b>legenac.admin</b><br>Bypass ACE: <b>legenac.bypass</b></div></aside></div></div></div><script src="app.js"></script></body></html>
